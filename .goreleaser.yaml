version: 2

project_name: aios

builds:
  - id: aios
    main: ./cmd/aios
    binary: aios
    env: [CGO_ENABLED=0]
    goos:   [darwin, linux]
    goarch: [amd64, arm64]
    ldflags:
      - -s -w -X github.com/Solaxis/aios/internal/cli.Version={{.Version}}

archives:
  - id: tar
    formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: "checksums.txt"

release:
  github:
    owner: Solaxis
    name: aios
