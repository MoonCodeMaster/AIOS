name: ci

on:
  pull_request: {}
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with: { go-version: "1.26" }
      - run: go vet ./...
      - run: go test ./...
      - run: AIOS_BIN=$(pwd)/bin/aios go build -o bin/aios ./cmd/aios
      - run: AIOS_BIN=$(pwd)/bin/aios go test ./test/integration/...

  # Validate the npm distribution sources on every PR/push. This is cheap
  # (pure Node, no install) and catches drift between npm/aios,
  # npm/platforms/*, scripts/*.mjs, and the launcher's platform table
  # long before a release tag is cut.
  npm-validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "20" }
      - run: node scripts/validate-npm.mjs

  # Dry-run the npm packager with --allow-missing-dist to prove the main
  # package stages cleanly (no binary copy attempted). Catches a broken
  # build-npm.mjs on every PR.
  npm-stage-dryrun:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "20" }
      - name: stage main package only (no binaries)
        env:
          AIOS_VERSION: 0.0.0-ci-dryrun
        run: node scripts/build-npm.mjs --allow-missing-dist
      - name: npm pack the staged main package
        run: |
          set -e
          cd dist/npm/aios
          npm pack --dry-run

  macos-real-engine-smoke:
    runs-on: macos-latest
    env:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
    steps:
      - name: Check auth secrets
        id: auth
        shell: bash
        run: |
          if [[ -n "${ANTHROPIC_API_KEY}" && -n "${OPENAI_API_KEY}" ]]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
            echo "ANTHROPIC_API_KEY and/or OPENAI_API_KEY are not set; skipping macOS real-engine smoke."
          fi

      - uses: actions/checkout@v4
        if: steps.auth.outputs.present == 'true'

      - uses: actions/setup-go@v5
        if: steps.auth.outputs.present == 'true'
        with: { go-version: "1.26" }

      - uses: actions/setup-node@v4
        if: steps.auth.outputs.present == 'true'
        with: { node-version: "20" }

      - name: Install Claude and Codex CLIs
        if: steps.auth.outputs.present == 'true'
        run: npm install -g @anthropic-ai/claude-code @openai/codex

      - name: Print CLI versions
        if: steps.auth.outputs.present == 'true'
        run: |
          claude --version
          codex --version

      - name: Real parallel engine smoke
        if: steps.auth.outputs.present == 'true'
        run: go test -tags=macos_smoke ./internal/engine -run TestRealEnginesParallelSmoke -v -count=1 -timeout 5m
