name: ci

on:
  pull_request: {}
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with: { go-version: "1.26" }
      - run: go vet ./...
      - run: go test ./...
      - run: AIOS_BIN=$(pwd)/bin/aios go build -o bin/aios ./cmd/aios
      - run: AIOS_BIN=$(pwd)/bin/aios go test ./test/integration/...
