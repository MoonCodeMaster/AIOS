schema_version = 1

[project]
  name = "AIOS"
  base_branch = "main"
  staging_branch = "aios/staging"

[engines]
  coder_default = "claude"
  reviewer_default = "codex"
  [engines.roles_by_kind]
    bugfix = "codex"
    feature = "claude"
    greenfield = "claude"
    refactor = "codex"
    scaffold = "claude"
    test-writing = "codex"
  [engines.claude]
    binary = "claude"
    timeout_sec = 600
    retry_max_attempts = 3
    retry_base_ms = 2000
  [engines.codex]
    binary = "codex"
    timeout_sec = 600
    retry_max_attempts = 3
    retry_base_ms = 2000

[budget]
  max_rounds_per_task = 5
  max_tokens_per_task = 200000
  max_wall_minutes_per_task = 30
  stall_threshold = 0
  max_decompose_depth = 0
  compress_after_rounds = 0
  compress_target_tokens = 0
  respec_min_overlap_score = 0.0

[verify]
  test_cmd = "go test ./..."
  lint_cmd = ""
  typecheck_cmd = ""
  build_cmd = "go build ./..."

[runtime]
  sandbox_image = "aios/sandbox:latest"
  worktree_root = ".aios/worktrees"

[parallel]

[mcp]

[specgen]

# --- v0.2 features (uncomment to override defaults) ---

# [budget]
# compress_history = true          # compress older rounds in coder prompt (default true)
# compress_after_rounds = 2        # keep last N rounds verbatim (default 2)
# compress_target_tokens = 50000   # token budget for compressed brief (default 50000)
# respec_on_abandon = true         # regenerate spec when sibling tasks abandon with overlap (default true)
# respec_min_overlap_score = 0.5   # Jaccard threshold for respec trigger (default 0.5)

# [engines.claude]
# retry_max_attempts = 3         # total attempts per invocation (default 3)
# retry_base_ms = 1000           # base backoff in ms before jitter (default 1000)
# retry_enabled = true           # set false to disable retries (default true)

# [engines.codex]
# retry_max_attempts = 3
# retry_base_ms = 1000
# retry_enabled = true

# [specgen]
# critique_enabled = true        # cross-model critique after polish (default true)
# critique_threshold = 9         # score 0-12; refine fires below this (default 9)

# [parallel]
# max_parallel_tasks = 4         # number of concurrent task workers (default 4)
# max_tokens_per_run = 1000000   # run-wide token cap; 0 disables (default 1,000,000)

# [mcp.servers.github]
