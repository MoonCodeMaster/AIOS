schema_version = 1

[project]
  name = "AIOS"
  base_branch = "main"
  staging_branch = "aios/staging"

[engines]
  coder_default = "claude"
  reviewer_default = "codex"
  [engines.roles_by_kind]
    bugfix = "codex"
    feature = "claude"
    greenfield = "claude"
    refactor = "codex"
    scaffold = "claude"
    test-writing = "codex"
  [engines.claude]
    binary = "claude"
    timeout_sec = 600
  [engines.codex]
    binary = "codex"
    timeout_sec = 600

[budget]
  max_rounds_per_task = 5
  max_tokens_per_task = 200000
  max_wall_minutes_per_task = 30

[verify]
  test_cmd = "go test ./..."
  lint_cmd = ""
  typecheck_cmd = ""
  build_cmd = "go build ./..."

[runtime]
  sandbox_image = "aios/sandbox:latest"
  worktree_root = ".aios/worktrees"

[parallel]

[mcp]

